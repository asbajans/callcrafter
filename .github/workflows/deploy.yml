name: Deploy to Portainer

on:
  push:
    branches:
      - master

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/callcrafter
  WS_DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/callcrafter-ws

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ steps.vars.outputs.sha_short }}

      - name: Build and push ws-server Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ws-server
          push: true
          tags: |
            ${{ env.WS_DOCKER_IMAGE }}:latest
            ${{ env.WS_DOCKER_IMAGE }}:${{ steps.vars.outputs.sha_short }}

      - name: Deploy to Portainer
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          PORTAINER_STACK_NAME: ${{ secrets.PORTAINER_STACK_NAME }}
          DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          WS_DOCKER_IMAGE: ${{ env.WS_DOCKER_IMAGE }}
          DOCKER_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          set -e
          echo "--- Fetching endpoint ---"
          ENDPOINT_ID=$(curl -sf -H "X-API-Key: $PORTAINER_API_KEY" \
            "$PORTAINER_URL/api/endpoints" | jq -r '.[] | select(.Type == 1) | .Id' | head -1)
          if [ -z "$ENDPOINT_ID" ] || [ "$ENDPOINT_ID" = "null" ]; then
            echo "ERROR: No valid endpoint found" >&2; exit 1
          fi
          echo "Endpoint: $ENDPOINT_ID"

          echo "--- Fetching stack ---"
          STACK_INFO=$(curl -sf -H "X-API-Key: $PORTAINER_API_KEY" \
            "$PORTAINER_URL/api/stacks") || { echo "ERROR: Failed to fetch stacks" >&2; exit 1; }
          STACK_ID=$(echo "$STACK_INFO" | jq -r --arg name "$PORTAINER_STACK_NAME" \
            '.[] | select(.Name == $name) | .Id')
          if [ -z "$STACK_ID" ] || [ "$STACK_ID" = "null" ]; then
            echo "ERROR: Stack '$PORTAINER_STACK_NAME' not found" >&2; exit 1
          fi
          echo "Stack ID: $STACK_ID"

          echo "--- Fetching current env vars ---"
          STACK_DETAIL=$(curl -sf -H "X-API-Key: $PORTAINER_API_KEY" \
            "$PORTAINER_URL/api/stacks/$STACK_ID") || { echo "ERROR: Failed to fetch stack" >&2; exit 1; }
          CURRENT_ENV=$(echo "$STACK_DETAIL" | jq -c '.Env // []')
          echo "Current env vars: $(echo "$CURRENT_ENV" | jq 'length')"

          echo "--- Updating DOCKER_TAG env var ---"
          UPDATED_ENV=$(echo "$CURRENT_ENV" | jq \
            --arg tag "$DOCKER_TAG" \
            'map(if .name == "DOCKER_TAG" then .value = $tag else . end) + if any(.name == "DOCKER_TAG") then [] else [{"name":"DOCKER_TAG","value":$tag}] end')
          echo "Env after update: $(echo "$UPDATED_ENV" | jq -r 'map("\(.name)=\(.value)") | .[]')"

          echo "--- Saving env vars to stack ---"
          curl -sf -X PUT \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --argjson env "$UPDATED_ENV" '{Env: $env}')" \
            "$PORTAINER_URL/api/stacks/$STACK_ID?endpointId=$ENDPOINT_ID" || { echo "ERROR: Failed to update env vars" >&2; exit 1; }
          echo "--- Env vars saved ---"

          echo "--- Redeploying from repository ---"
          curl -sf -X POST \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"Prune": true}' \
            "$PORTAINER_URL/api/stacks/$STACK_ID/git/redeploy?endpointId=$ENDPOINT_ID" || { echo "ERROR: Redeploy failed" >&2; exit 1; }
          echo "--- Redeploy triggered successfully ---"
