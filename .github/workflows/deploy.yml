name: Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            asbajans/callcrafter:latest
            asbajans/callcrafter:${{ github.sha }}

      - name: Build and push ws-server
        uses: docker/build-push-action@v6
        with:
          context: ws-server
          file: ws-server/Dockerfile
          push: true
          tags: |
            asbajans/callcrafter-ws:latest
            asbajans/callcrafter-ws:${{ github.sha }}

      - name: Trigger Portainer redeploy (git stack)
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          STACK_NAME: ${{ secrets.PORTAINER_STACK_NAME }}
        run: |
          ENDPOINT_ID=$(python3 -c "
          import urllib.request, json
          req = urllib.request.Request('$PORTAINER_URL/api/endpoints')
          req.add_header('Authorization', 'Bearer $PORTAINER_API_KEY')
          data = json.loads(urllib.request.urlopen(req).read())
          print(data[0]['Id'])
          ")
          echo "Endpoint: $ENDPOINT_ID"

          STACK_ID=$(python3 -c "
          import urllib.request, json
          req = urllib.request.Request('$PORTAINER_URL/api/stacks')
          req.add_header('Authorization', 'Bearer $PORTAINER_API_KEY')
          data = json.loads(urllib.request.urlopen(req).read())
          stack = [s for s in data if s['Name'] == '$STACK_NAME'][0]
          print(stack['Id'])
          ")
          echo "Stack ID: $STACK_ID"

          echo "Triggering redeploy..."
          for i in 1 2; do
            RESP=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
              "$PORTAINER_URL/api/stacks/$STACK_ID/git/redeploy?endpointId=$ENDPOINT_ID" \
              -H "Authorization: Bearer $PORTAINER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"env":[],"prune":true,"repositoryReferenceName":"refs/heads/master"}')
            echo "Attempt $i: HTTP $RESP"
            if [ "$RESP" = "200" ]; then
              echo "Redeploy triggered successfully"
              break
            fi
            if [ "$i" = "1" ]; then
              echo "Retrying in 3s..."
              sleep 3
            fi
          done
