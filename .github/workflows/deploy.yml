name: Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            asbajans/callcrafter:latest
            asbajans/callcrafter:${{ github.sha }}

      - name: Build and push ws-server
        uses: docker/build-push-action@v6
        with:
          context: ws-server
          file: ws-server/Dockerfile
          push: true
          tags: |
            asbajans/callcrafter-ws:latest
            asbajans/callcrafter-ws:${{ github.sha }}

      - name: Build and push piper-server
        uses: docker/build-push-action@v6
        with:
          context: piper-server
          file: piper-server/Dockerfile
          push: true
          tags: |
            asbajans/callcrafter-piper:latest
            asbajans/callcrafter-piper:${{ github.sha }}

      - name: Build and push edge-tts-server
        uses: docker/build-push-action@v6
        with:
          context: edge-tts-server
          file: edge-tts-server/Dockerfile
          push: true
          tags: |
            asbajans/callcrafter-edge-tts:latest
            asbajans/callcrafter-edge-tts:${{ github.sha }}

      - name: Trigger Portainer redeploy (webhook)
        run: |
          for i in 1 2; do
            RESP=$(curl -sS -o /dev/null -w "%{http_code}" -X POST \
              "${{ secrets.PORTAINER_WEBHOOK_URL }}")
            echo "Attempt $i: HTTP $RESP"
            if [ "$RESP" = "200" ] || [ "$RESP" = "204" ]; then
              echo "Redeploy triggered successfully"
              break
            fi
            if [ "$i" = "1" ]; then
              echo "Retrying in 3s..."
              sleep 3
            fi
          done
