name: Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            asbajans/callcrafter:latest
            asbajans/callcrafter:${{ github.sha }}

      - name: Build and push ws-server
        uses: docker/build-push-action@v6
        with:
          context: ws-server
          file: ws-server/Dockerfile
          push: true
          tags: |
            asbajans/callcrafter-ws:latest
            asbajans/callcrafter-ws:${{ github.sha }}

      - name: Trigger Portainer redeploy
        run: curl -sS -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
