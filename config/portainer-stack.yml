services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - callcrafter_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - callcrafter_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${DOCKER_IMAGE:-asbajans/callcrafter}:${DOCKER_TAG:-latest}
    container_name: app
    restart: unless-stopped
    ports:
      - "3500:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URI: ${DATABASE_URI}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      REDIS_URL: ${REDIS_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      WS_SERVER_URL: http://ws-server:8080
      WS_PUBLIC_URL: wss://ws.callcrafter.com.tr
    networks:
      - callcrafter_network

  ws-server:
    image: ${WS_DOCKER_IMAGE:-asbajans/callcrafter-ws}:${DOCKER_TAG:-latest}
    container_name: ws-server
    restart: unless-stopped
    ports:
      - "3501:8080"
    environment:
      WS_HTTP_PORT: 8080
      WS_WS_PORT: 8080
      WS_PUBLIC_URL: wss://ws.callcrafter.com.tr
      APP_API_URL: http://app:3000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ZADARMA_API_KEY: ${ZADARMA_API_KEY}
      ZADARMA_SECRET: ${ZADARMA_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    depends_on:
      - redis
    networks:
      - callcrafter_network

volumes:
  postgres_data:
  redis_data:

networks:
  callcrafter_network:
    driver: bridge
