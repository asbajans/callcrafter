services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - callcrafter_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - callcrafter_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ${DOCKER_IMAGE:-asbajans/callcrafter}:${DOCKER_TAG:-latest}
    container_name: app
    restart: unless-stopped
    ports:
      - "3500:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URI: ${DATABASE_URI}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      REDIS_URL: ${REDIS_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      WS_SERVER_URL: ${WS_SERVER_URL}
      WS_PUBLIC_URL: ${WS_PUBLIC_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      ZADARMA_API_KEY: ${ZADARMA_API_KEY}
      ZADARMA_SECRET: ${ZADARMA_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      INSTAGRAM_IG_USER_ID: ${INSTAGRAM_IG_USER_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN}
      INSTAGRAM_APP_SECRET: ${INSTAGRAM_APP_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      WA_BRIDGE_URL: http://wa-bridge:8080
      WA_BRIDGE_API_KEY: ${WA_BRIDGE_API_KEY}
      WA_BRIDGE_WEBHOOK_SECRET: ${WA_BRIDGE_WEBHOOK_SECRET}
      WHATSAPP_CONTEXT_RESET_MINUTES: ${WHATSAPP_CONTEXT_RESET_MINUTES:-30}
      PIPER_TTS_URL: http://piper-tts:5000
      EDGE_TTS_URL: http://edge-tts:5000
      WHISPER_SERVER_URL: http://whisper-server:9000
    networks:
      - callcrafter_network

  ws-server:
    image: ${WS_DOCKER_IMAGE:-asbajans/callcrafter-ws}:${DOCKER_TAG:-latest}
    container_name: ws-server
    restart: unless-stopped
    ports:
      - "3501:8080"
    environment:
      WS_HTTP_PORT: 8080
      WS_WS_PORT: 8080
      WS_PUBLIC_URL: ${WS_PUBLIC_URL}
      APP_API_URL: http://app:3000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ZADARMA_API_KEY: ${ZADARMA_API_KEY}
      ZADARMA_SECRET: ${ZADARMA_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      WHISPER_SERVER_URL: http://whisper-server:9000
      PIPER_TTS_URL: http://piper-tts:5000
      EDGE_TTS_URL: http://edge-tts:5000
    depends_on:
      app:
        condition: service_started
    networks:
      - callcrafter_network

  whisper-server:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper-server
    restart: unless-stopped
    ports:
      - "3502:9000"
    environment:
      ASR_MODEL: base
      ASR_ENGINE: faster_whisper
    volumes:
      - whisper_models:/app/whisper/models
    networks:
      - callcrafter_network

  piper-tts:
    image: ${PIPER_DOCKER_IMAGE:-asbajans/callcrafter-piper}:${DOCKER_TAG:-latest}
    container_name: piper-tts
    restart: unless-stopped
    ports:
      - "3503:5000"
    volumes:
      - piper_models:/app/models
    networks:
      - callcrafter_network

  edge-tts:
    image: ${DOCKER_IMAGE:-asbajans/callcrafter-edge-tts}:${DOCKER_TAG:-latest}
    container_name: edge-tts
    restart: unless-stopped
    ports:
      - "3504:5000"
    networks:
      - callcrafter_network

  wa-bridge:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: wa-bridge
    restart: unless-stopped
    environment:
      SERVER_URL: http://wa-bridge:8080
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${WA_BRIDGE_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DEL_INSTANCE: "false"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${DATABASE_URI}?schema=evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "false"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      CACHE_REDIS_ENABLED: "false"
      QRCODE_LIMIT: "10"
      QRCODE_COLOR: "#6c3fff"
      CONFIG_SESSION_PHONE_CLIENT: "Evolution API"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
      LOG_LEVEL: ERROR,WARN,INFO
      LOG_COLOR: "true"
    volumes:
      - wa_bridge_data:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - callcrafter_network

volumes:
  postgres_data:
  redis_data:
  wa_bridge_data:
  whisper_models:
  piper_models:

networks:
  callcrafter_network:
    driver: bridge
